<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard Login - All Things Automated</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #e8f4f0 0%, #eef6fb 50%, #fdf6ee 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      font-family: 'Inter', sans-serif;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      height: 32px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
    }

    .login-logo img {
      height: 32px;
    }

    .login-header h1 {
      font-size: 28px;
      color: #0A0A0A;
      margin-bottom: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
    }

    .login-header p {
      font-size: 13px;
      color: #888;
      font-weight: 300;
    }

    .login-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      padding: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 12px;
      color: #0A0A0A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #0A0A0A;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #3A7FC1;
      box-shadow: 0 0 0 3px rgba(58, 127, 193, 0.12);
    }

    input::placeholder {
      color: #999;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #0A0A0A;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      background-color: #3A7FC1;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(58, 127, 193, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .error-message {
      color: #d32f2f;
      font-size: 12px;
      font-weight: 400;
      margin-bottom: 16px;
      padding: 10px 12px;
      background-color: #ffebee;
      border-radius: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #888;
    }

    .login-footer a {
      color: #3A7FC1;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .login-footer a:hover {
      color: #0A0A0A;
    }

    .back-link {
      text-align: center;
      margin-top: 32px;
    }

    .back-link a {
      color: #888;
      font-size: 12px;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link a:hover {
      color: #0A0A0A;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-header">
      <div class="login-logo">
        <img src="assets/logo-color.svg" alt="All Things Automated">
      </div>
      <h1>Admin Dashboard</h1>
      <p>Staff Access Only</p>
    </div>

    <div class="login-card">
      <div class="error-message" id="errorMessage"></div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="admin@allthingsautomated.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="submit-btn">Sign In to Dashboard</button>
      </form>

      <div class="login-footer">
        Having trouble logging in? Contact support at hello@allthingsautomated.com
      </div>
    </div>

    <div class="back-link">
      <a href="/">← Back to Website</a>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('ata_admin') === 'true') {
      window.location.href = '/admin/dashboard';
    }

    // Handle login form
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Hardcoded credentials
      const validEmail = 'admin@allthingsautomated.com';
      const validPassword = 'ATA2025!';

      if (email === validEmail && password === validPassword) {
        // Set auth flag in localStorage
        localStorage.setItem('ata_admin', 'true');
        // Redirect to dashboard
        window.location.href = '/admin/dashboard';
      } else {
        // Show error message
        errorMessage.textContent = '❌ Invalid email or password. Please try again.';
        errorMessage.classList.add('show');
        passwordInput.value = '';
        emailInput.focus();
      }
    });

    // Clear error message when user starts typing
    emailInput.addEventListener('input', () => {
      errorMessage.classList.remove('show');
    });

    passwordInput.addEventListener('input', () => {
      errorMessage.classList.remove('show');
    });
  </script>
</body>
</html>
