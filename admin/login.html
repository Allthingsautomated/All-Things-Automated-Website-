<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - All Things Automated</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    body {
      background-color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      height: 28px;
      margin-bottom: 32px;
      display: flex;
      justify-content: center;
    }

    .login-logo img {
      height: 28px;
    }

    .login-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.08);
      padding: 48px;
    }

    .login-card h2 {
      margin-bottom: 8px;
    }

    .login-subtext {
      font-size: 13px;
      color: #888;
      font-weight: 300;
      margin-bottom: 32px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 12px;
      color: #0A0A0A;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #eee;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #0A0A0A;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #3A7FC1;
      box-shadow: 0 0 0 3px rgba(58, 127, 193, 0.12);
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: #0A0A0A;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
    }

    .submit-btn:hover {
      background-color: #3A7FC1;
    }

    .error-message {
      color: #d32f2f;
      font-size: 12px;
      font-weight: 300;
      margin-top: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <img src="../assets/logo-color.svg" alt="All Things Automated">
    </div>

    <div class="login-card">
      <h2>Admin Login</h2>
      <p class="login-subtext">All Things Automated — Staff Access Only</p>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@allthingsautomated.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <button type="submit" class="submit-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('ata_admin') === 'true') {
      window.location.href = 'dashboard.html';
    }

    // Handle login form
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Hardcoded credentials
      const validEmail = 'admin@allthingsautomated.com';
      const validPassword = 'ATA2025!';

      if (email === validEmail && password === validPassword) {
        // Set auth flag in localStorage
        localStorage.setItem('ata_admin', 'true');
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } else {
        // Show error message
        errorMessage.textContent = 'Invalid email or password.';
        errorMessage.classList.add('show');
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>
